site_name: XLuau
site_description: Rust-based XLuau compiler documentation
site_url: https://xluau.github.io/xluau/
repo_url: https://github.com/xluau/xluau
repo_name: xluau/xluau
edit_uri: edit/main/docs/
docs_dir: ../docs
site_dir: dist
use_directory_urls: false

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

nav:
  - Overview: intro.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Roadmap Status: roadmap-status.md
  - Phases:
      - Phase 1 - Core Infrastructure: phases/phase-1-core-infrastructure.md
      - Phase 2 - High-Impact Syntax: phases/phase-2-high-impact-syntax.md
      - Phase 3 - Module System: phases/phase-3-module-system.md
      - Phase 4 - Type System Extensions: phases/phase-4-type-system-extensions.md
      - Phase 5 - OOP: phases/phase-5-oop.md
